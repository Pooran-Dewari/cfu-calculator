<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CFU Calculator</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9fafc;
      margin: 0;
      padding: 30px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    .input-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background-color: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .input-section label {
      width: 48%;
      margin-bottom: 10px;
      font-weight: 600;
      color: #444;
    }

    .input-section input,
    .input-section select {
      width: 48%;
      padding: 8px 10px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      transition: border 0.3s;
    }

    .input-section input:focus,
    .input-section select:focus {
      border-color: #0078d7;
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #e0e0e0;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }

    th {
      background-color: #f0f0f0;
      font-weight: bold;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 90%;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .btn {
      background-color: #0078d7;
      color: white;
      padding: 10px 16px;
      margin: 10px 5px 0 0;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn:hover {
      background-color: #005fa3;
    }

    .error {
      background-color: #ffe6e6 !important;
    }

    .od600-input {
      background-color: #e6ffe6 !important;
    }

    .error-message {
      color: red;
      font-size: 12px;
      margin-top: 2px;
    }

    @media (max-width: 600px) {
      .input-section label,
      .input-section input,
      .input-section select {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<h2>CFU Calculator</h2>

<div class="input-section">
  <label for="workingCFU">Final CFU/mL for bacterial challenge:</label>
  <select id="workingCFU">
    <option value="1e4">1.0E+4</option>
    <option value="1e5">1.0E+5</option>
    <option value="1e6" selected>1.0E+6</option>
    <option value="1e7">1.0E+7</option>
    <option value="1e8">1.0E+8</option>
  </select>

  <label for="totalVolume">Final seawater volume (mL):</label>
  <input type="number" id="totalVolume" value="4000" step="1000" min="1000">

  <label for="originalOD">OD of Original culture used for CFU assay:</label>
  <input type="number" id="originalOD" value="0.2" min="0.01" max="5" step="0.01">

  <label for="volumeSpread">Volume spread on plate (µL):</label>
  <input type="number" id="volumeSpread" value="30" min="1" step="10">
</div>

<table>
  <thead>
    <tr>
      <th>Strain</th>
      <th>Total colony count</th>
      <th>Dilution Factor for Colony Count</th>
      <th>CFU/mL @ OD 1.0</th>
      <th>Total CFU Required</th>
      <th>OD 600</th>
      <th>Bacterial Culture Required (mL)</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <!-- Rows here, same as previous script -->
  </tbody>
</table>

<button class="btn" onclick="addRow()">Add Row</button>
<button class="btn" onclick="exportToExcel()">Export to Excel</button>
<button class="btn" onclick="exportToCSV()">Export to CSV</button>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script>
  // Insert JavaScript logic here (same as previous script)
</script>

</body>
</html>
