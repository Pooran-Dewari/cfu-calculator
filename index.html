<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CFU Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .input-section {
      margin-bottom: 20px;
    }

    .input-section label {
      margin-right: 10px;
    }

    .input-field {
      width: 100px;
    }
  </style>
</head>
<body>

<div class="title">CFU Calculator</div>

<div class="input-section">
  <label for="workingCFU">Working CFU/mL:</label>
  <input type="number" id="workingCFU" class="input-field" value="1e6">

  <label for="totalVolume" style="margin-left: 20px;">Total Volume Oysters (mL):</label>
  <input type="number" id="totalVolume" class="input-field" value="4000">
</div>

<table>
  <thead>
    <tr>
      <th>Strain</th>
      <th>Colonies per 30 µL</th>
      <th>Dilution Factor 1<br>(fold dilution of original 0.2 OD culture)</th>
      <th>Dilution Factor 2<br>(10 µL to 1 mL)</th>
      <th>CFU/mL @ 0.1 OD</th>
    </tr>
  </thead>
  <tbody id="strainTable">
    <tr>
      <td><input type="text" value="855"></td>
      <td><input type="number" class="colonies" value="19"></td>
      <td>
        <select class="dilution1">
          <option value="1e3">1e3</option>
          <option value="1e4">1e4</option>
          <option value="1e5">1e5</option>
          <option value="1e6" selected>1e6</option>
          <option value="1e7">1e7</option>
        </select>
      </td>
      <td><input type="number" class="dilution2" value="100"></td>
      <td class="cfu0_1">-</td>
    </tr>
    <tr>
      <td><input type="text" value="1128"></td>
      <td><input type="number" class="colonies" value="42"></td>
      <td>
        <select class="dilution1">
          <option value="1e3">1e3</option>
          <option value="1e4" selected>1e4</option>
          <option value="1e5">1e5</option>
          <option value="1e6">1e6</option>
          <option value="1e7">1e7</option>
        </select>
      </td>
      <td><input type="number" class="dilution2" value="100"></td>
      <td class="cfu0_1">-</td>
    </tr>
    <tr>
      <td><input type="text" value="1159"></td>
      <td><input type="number" class="colonies" value="13"></td>
      <td>
        <select class="dilution1">
          <option value="1e3">1e3</option>
          <option value="1e4">1e4</option>
          <option value="1e5">1e5</option>
          <option value="1e6" selected>1e6</option>
          <option value="1e7">1e7</option>
        </select>
      </td>
      <td><input type="number" class="dilution2" value="100"></td>
      <td class="cfu0_1">-</td>
    </tr>
  </tbody>
</table>

<h3>Bacterial Culture Volume Required (for 4L)</h3>

<table>
  <thead>
    <tr>
      <th>OD 600</th>
      <th>Bacterial Culture in mL Required</th>
    </tr>
  </thead>
  <tbody id="odTable">
    <tr>
      <td><input type="number" class="odValue" value="0.2"></td>
      <td class="requiredVolume">-</td>
    </tr>
    <tr>
      <td><input type="number" class="odValue" value="0.565"></td>
      <td class="requiredVolume">-</td>
    </tr>
    <tr>
      <td><input type="number" class="odValue" value="0.2"></td>
      <td class="requiredVolume">-</td>
    </tr>
  </tbody>
</table>

<script>
  function updateCalculations() {
    const workingCFU = parseFloat(document.getElementById("workingCFU").value) || 0;
    const totalVolume = parseFloat(document.getElementById("totalVolume").value) || 0;

    const strainRows = document.querySelectorAll("#strainTable tr");
    const odRows = document.querySelectorAll("#odTable tr");

    const cfuList = [];

    strainRows.forEach((row, i) => {
      const colonies = parseFloat(row.querySelector(".colonies").value) || 0;
      const dilution1 = parseFloat(row.querySelector(".dilution1").value) || 1;
      const dilution2 = parseFloat(row.querySelector(".dilution2").value) || 1;

      const cfu_0_2 = (colonies * dilution1 * dilution2) / 3;
      const cfu_0_1 = cfu_0_2 / 2;

      row.querySelector(".cfu0_1").innerText = cfu_0_1 ? cfu_0_1.toExponential(2) : "-";
      cfuList[i] = cfu_0_1;
    });

    odRows.forEach((row, i) => {
      const od = parseFloat(row.querySelector(".odValue").value) || 0;
      const cfu = cfuList[i] || 0;
      const output = row.querySelector(".requiredVolume");

      if (od > 0 && cfu > 0) {
        const requiredVolume = (workingCFU * totalVolume) / (od * cfu);
        output.innerText = requiredVolume.toFixed(2);
      } else {
        output.innerText = "-";
      }
    });
  }

  document.querySelectorAll("input, select").forEach(input => {
    input.addEventListener("input", updateCalculations);
  });

  // Initial run
  updateCalculations();
</script>

</body>
</html>
