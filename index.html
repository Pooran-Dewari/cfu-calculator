<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CFU Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    label, select, input {
      margin: 5px 10px 15px 0;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    button {
      margin-top: 15px;
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="title">CFU Calculator</div>

  <div>
    <label>OD of Original Culture:
      <input type="number" id="odOriginal" value="0.2" min="0.01" max="5" step="0.01">
    </label>

    <label>Final CFU/mL for bacterial challenge:
      <select id="workingCFU">
        <option value="1e4">1.0E+04</option>
        <option value="1e5">1.0E+05</option>
        <option value="1e6" selected>1.0E+06</option>
        <option value="1e7">1.0E+07</option>
        <option value="1e8">1.0E+08</option>
      </select>
    </label>

    <label>Final seawater volume for bacterial challenge (mL):
      <input type="number" id="volumeOysters" value="4000" min="1000" step="1000">
    </label>
  </div>

  <table>
    <thead>
      <tr>
        <th>Strain</th>
        <th>Colonies per 30 µL</th>
        <th>Dilution Factor 1 (fold dilution of original 0.2 OD culture)</th>
        <th>Dilution Factor 2 (10 µL to 1 mL)</th>
        <th>OD 600</th>
        <th>CFU/mL @ OD 1.0</th>
        <th>Total CFU Required</th>
        <th>Bacterial Culture in mL Required (for challenge)</th>
      </tr>
    </thead>
    <tbody id="cfuTableBody">
      <tr>
        <td><input type="text" value="855"></td>
        <td><input type="number" class="colonies" value="19" min="0"></td>
        <td>
          <select class="dilution1">
            <option value="1e3">1e3</option>
            <option value="1e4">1e4</option>
            <option value="1e5">1e5</option>
            <option value="1e6" selected>1e6</option>
            <option value="1e7">1e7</option>
            <option value="1e8">1e8</option>
          </select>
        </td>
        <td><input type="number" class="dilution2" value="100" min="1"></td>
        <td><input type="number" class="od600" value="0.2" min="0.01" max="5" step="any"></td>
        <td class="cfu_od1">-</td>
        <td class="total_cfu_required">-</td>
        <td class="bacterial_required">-</td>
      </tr>
    </tbody>
  </table>

  <button onclick="addRow()">Add Row</button>
  <button onclick="exportTable()">Export to Excel</button>

  <script>
    function updateCalculations() {
      const rows = document.querySelectorAll("#cfuTableBody tr");
      const odOriginal = parseFloat(document.getElementById("odOriginal").value) || 1;
      const workingCFU = parseFloat(document.getElementById("workingCFU").value) || 1e6;
      const volumeOysters = parseFloat(document.getElementById("volumeOysters").value) || 4000;

      rows.forEach(row => {
        const colonies = parseFloat(row.querySelector(".colonies").value) || 0;
        const dilution1 = parseFloat(row.querySelector(".dilution1").value) || 1;
        const dilution2 = parseFloat(row.querySelector(".dilution2").value) || 1;
        const od600 = parseFloat(row.querySelector(".od600").value) || 0;

        if (odOriginal <= 0 || od600 <= 0 || colonies < 0 || dilution2 <= 0) {
          row.querySelector(".cfu_od1").innerText = "-";
          row.querySelector(".total_cfu_required").innerText = "-";
          row.querySelector(".bacterial_required").innerText = "-";
          return;
        }

        const cfu_od1 = (colonies * dilution1 * dilution2) / 3 / odOriginal;
        const totalCFU = workingCFU * volumeOysters;
        const cultureRequired = totalCFU / (cfu_od1 * od600);

        row.querySelector(".cfu_od1").innerText = cfu_od1.toExponential(2);
        row.querySelector(".total_cfu_required").innerText = totalCFU.toExponential(2);
        row.querySelector(".bacterial_required").innerText = isFinite(cultureRequired) ? cultureRequired.toFixed(2) : "-";
      });
    }

    document.querySelectorAll("input, select").forEach(input => {
      input.addEventListener("input", updateCalculations);
    });

    function addRow() {
      const tbody = document.getElementById("cfuTableBody");
      const row = tbody.rows[0].cloneNode(true);
      row.querySelectorAll("input").forEach(input => {
        if (input.classList.contains("colonies")) input.value = 0;
        if (input.classList.contains("dilution2")) input.value = 100;
        if (input.classList.contains("od600")) input.value = 0.2;
        else input.value = "";
      });
      row.querySelectorAll(".cfu_od1, .total_cfu_required, .bacterial_required").forEach(cell => cell.innerText = "-");
      tbody.appendChild(row);
      row.querySelectorAll("input, select").forEach(input => {
        input.addEventListener("input", updateCalculations);
      });
    }

    function exportTable() {
      let table = [['Strain', 'Colonies per 30 µL', 'Dilution Factor 1', 'Dilution Factor 2', 'OD 600', 'CFU/mL @ OD 1.0', 'Total CFU Required', 'Bacterial Culture in mL Required']];
      document.querySelectorAll("#cfuTableBody tr").forEach(row => {
        let rowData = [];
        row.querySelectorAll("td").forEach((cell, i) => {
          const input = cell.querySelector("input, select");
          rowData.push(input ? input.value : cell.innerText);
        });
        table.push(rowData);
      });

      let csv = table.map(e => e.join(",")).join("\n");
      let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      let link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "cfu_calculations.csv";
      link.click();
    }

    // Initial calculation
    updateCalculations();
  </script>

</body>
</html>
