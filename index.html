<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CFU Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .input-section {
      margin-bottom: 30px;
    }

    .input-section label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .input-section input {
      width: 200px;
      padding: 5px;
      margin-bottom: 15px;
      display: block;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="title">CFU Calculator</div>

<div class="input-section">
  <label for="workingCFU">Working CFU/mL:</label>
  <input type="number" id="workingCFU" value="1000000">

  <label for="totalVolume">Total Volume Oysters (mL):</label>
  <input type="number" id="totalVolume" value="4000">

  <label for="originalOD">OD of Original Culture:</label>
  <input type="number" id="originalOD" value="0.2">
</div>

<table>
  <thead>
    <tr>
      <th>Strain</th>
      <th>Colonies per 30 µL</th>
      <th>Dilution Factor 1<br>(fold dilution of original culture)</th>
      <th>Dilution Factor 2<br>(10 µL to 1 mL)</th>
      <th>CFU/mL @ OD 1.0</th>
      <th>Total CFU Required</th>
      <th>Bacterial Culture in mL Required (for 4L)</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr>
      <td><input type="text" value="855"></td>
      <td><input type="number" class="colonies" value="19"></td>
      <td>
        <select class="dilution1">
          <option value="1e3">1e3</option>
          <option value="1e4">1e4</option>
          <option value="1e5">1e5</option>
          <option value="1e6" selected>1e6</option>
          <option value="1e7">1e7</option>
        </select>
      </td>
      <td><input type="number" class="dilution2" value="100"></td>
      <td class="cfuPerMl">-</td>
      <td class="totalCFU">-</td>
      <td class="requiredVolume">-</td>
    </tr>
  </tbody>
</table>

<button class="btn" onclick="exportToCSV()">Export to CSV</button>

<script>
function updateCalculations() {
  const workingCFU = parseFloat(document.getElementById("workingCFU").value) || 0;
  const totalVolume = parseFloat(document.getElementById("totalVolume").value) || 0;
  const originalOD = parseFloat(document.getElementById("originalOD").value) || 1;

  const totalCFURequired = workingCFU * totalVolume;

  const rows = document.querySelectorAll("#tableBody tr");
  rows.forEach(row => {
    const colonies = parseFloat(row.querySelector(".colonies").value) || 0;
    const dilution1 = parseFloat(row.querySelector(".dilution1").value) || 1;
    const dilution2 = parseFloat(row.querySelector(".dilution2").value) || 1;

    const cfuPerMl = ((colonies * dilution1 * dilution2) / 3) / originalOD;
    row.querySelector(".cfuPerMl").innerText = isFinite(cfuPerMl) ? cfuPerMl.toExponential(2) : "-";
    row.querySelector(".totalCFU").innerText = isFinite(totalCFURequired) ? totalCFURequired.toExponential(2) : "-";

    const requiredVolume = totalCFURequired / (cfuPerMl * originalOD);
    row.querySelector(".requiredVolume").innerText = isFinite(requiredVolume) ? requiredVolume.toFixed(2) : "-";
  });
}

function exportToCSV() {
  let csv = 'Strain,Colonies per 30 uL,Dilution Factor 1,Dilution Factor 2,CFU/mL @ OD 1.0,Total CFU Required,Bacterial Culture in mL Required (for 4L)\n';

  const rows = document.querySelectorAll("#tableBody tr");
  rows.forEach(row => {
    const strain = row.querySelector("td:nth-child(1) input").value;
    const colonies = row.querySelector("td:nth-child(2) input").value;
    const dilution1 = row.querySelector(".dilution1").value;
    const dilution2 = row.querySelector(".dilution2").value;
    const cfuPerMl = row.querySelector(".cfuPerMl").innerText;
    const totalCFU = row.querySelector(".totalCFU").innerText;
    const requiredVolume = row.querySelector(".requiredVolume").innerText;

    csv += `${strain},${colonies},${dilution1},${dilution2},${cfuPerMl},${totalCFU},${requiredVolume}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cfu_calculations.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", updateCalculations);
  el.addEventListener("change", updateCalculations);
});

updateCalculations();
</script>

</body>
</html>
