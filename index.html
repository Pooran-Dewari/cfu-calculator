<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CFU Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .input-section { margin-bottom: 20px; }
    .input-section label { display: block; margin-top: 10px; font-weight: bold; }
    .input-section input, .input-section select { width: 300px; padding: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f4f4f4; }
    .btn { margin-top: 20px; padding: 10px; font-size: 14px; cursor: pointer; margin-right: 10px; }
    input[type="number"], input[type="text"], select { width: 100px; }
  </style>
</head>
<body>

<h2>CFU Calculator</h2>

<div class="input-section">
  <label>OD of Original Culture:</label>
  <input type="number" id="originalOD" value="0.2" step="0.1">

  <label>Final CFU/mL for bacterial challenge:</label>
  <select id="workingCFU">
    <option value="1e4">1.0E+4</option>
    <option value="1e5">1.0E+5</option>
    <option value="1e6" selected>1.0E+6</option>
    <option value="1e7">1.0E+7</option>
    <option value="1e8">1.0E+8</option>
  </select>

  <label>Final seawater volume for bacterial challenge (mL):</label>
  <input type="number" id="totalVolume" value="4000" step="1000">
</div>

<table>
  <thead>
    <tr>
      <th>Strain</th>
      <th>Colonies per 30 µL</th>
      <th>Dilution Factor 1<br>(fold dilution)</th>
      <th>Dilution Factor 2<br>(10 µL to 1 mL)</th>
      <th>CFU/mL @ OD 1.0</th>
      <th>OD 600</th>
      <th>Total CFU Required</th>
      <th>Bacterial Culture in mL Required</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr>
      <td><input type="text" class="strain" value="855"></td>
      <td><input type="number" class="colonies" value="19"></td>
      <td>
        <select class="dilution1">
          <option value="1e3">1e3</option>
          <option value="1e4">1e4</option>
          <option value="1e5">1e5</option>
          <option value="1e6" selected>1e6</option>
          <option value="1e7">1e7</option>
        </select>
      </td>
      <td><input type="number" class="dilution2" value="100"></td>
      <td class="cfuPerMl">-</td>
      <td><input type="number" class="od600" value="0.2" step="any"></td>
      <td class="totalCFU">-</td>
      <td class="requiredVolume">-</td>
    </tr>
  </tbody>
</table>

<button class="btn" onclick="addRow()">Add Row</button>
<button class="btn" onclick="exportToCSV()">Export to CSV</button>

<script>
function updateCalculations() {
  const originalOD = parseFloat(document.getElementById("originalOD").value) || 0;
  const workingCFU = parseFloat(document.getElementById("workingCFU").value) || 0;
  const totalVolume = parseFloat(document.getElementById("totalVolume").value) || 0;
  const totalCFURequired = workingCFU * totalVolume;

  document.querySelectorAll("#tableBody tr").forEach(row => {
    const colonies = parseFloat(row.querySelector(".colonies").value) || 0;
    const dilution1 = parseFloat(row.querySelector(".dilution1").value) || 1;
    const dilution2 = parseFloat(row.querySelector(".dilution2").value) || 1;
    const rowOD600 = parseFloat(row.querySelector(".od600").value) || 0;

    const cfuPerMl = originalOD > 0 ? (colonies * dilution1 * dilution2) / (3 * originalOD) : 0;
    const requiredVolume = (cfuPerMl > 0 && rowOD600 > 0) ? totalCFURequired / (cfuPerMl * rowOD600) : 0;

    row.querySelector(".cfuPerMl").innerText = isFinite(cfuPerMl) && cfuPerMl > 0 ? cfuPerMl.toExponential(2) : "-";
    row.querySelector(".totalCFU").innerText = isFinite(totalCFURequired) && totalCFURequired > 0 ? totalCFURequired.toExponential(2) : "-";
    row.querySelector(".requiredVolume").innerText = isFinite(requiredVolume) && requiredVolume > 0 ? requiredVolume.toFixed(2) : "-";
  });
}

function addRow() {
  const row = document.createElement("tr");
  row.innerHTML = `
    <td><input type="text" class="strain" value=""></td>
    <td><input type="number" class="colonies" value=""></td>
    <td>
      <select class="dilution1">
        <option value="1e3">1e3</option>
        <option value="1e4">1e4</option>
        <option value="1e5">1e5</option>
        <option value="1e6" selected>1e6</option>
        <option value="1e7">1e7</option>
      </select>
    </td>
    <td><input type="number" class="dilution2" value="100"></td>
    <td class="cfuPerMl">-</td>
    <td><input type="number" class="od600" value="0.2" step="any"></td>
    <td class="totalCFU">-</td>
    <td class="requiredVolume">-</td>
  `;
  document.getElementById("tableBody").appendChild(row);
  row.querySelectorAll("input, select").forEach(el => {
    el.addEventListener("input", updateCalculations);
    el.addEventListener("change", updateCalculations);
  });
  updateCalculations();
}

function exportToCSV() {
  let csv = 'Strain,Colonies,Dilution1,Dilution2,CFU/mL @ OD1,OD600,Total CFU Required,Bacterial Culture (mL)\n';
  document.querySelectorAll("#tableBody tr").forEach(row => {
    const strain = row.querySelector(".strain").value;
    const colonies = row.querySelector(".colonies").value;
    const dilution1 = row.querySelector(".dilution1").value;
    const dilution2 = row.querySelector(".dilution2").value;
    const cfuPerMl = row.querySelector(".cfuPerMl").innerText;
    const od600 = row.querySelector(".od600").value;
    const totalCFU = row.querySelector(".totalCFU").innerText;
    const requiredVolume = row.querySelector(".requiredVolume").innerText;

    csv += `${strain},${colonies},${dilution1},${dilution2},${cfuPerMl},${od600},${totalCFU},${requiredVolume}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cfu_calculations.csv";
  a.click();
}

document.querySelectorAll("input, select").forEach(el => {
  el.addEventListener("input", updateCalculations);
  el.addEventListener("change", updateCalculations);
});

updateCalculations();
</script>

</body>
</html>
