<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CFU Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 800px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: center;
    }
    th {
      background-color: #f5f5f5;
    }
    input {
      width: 100%;
      box-sizing: border-box;
    }
    select {
      width: 100%;
    }
  </style>
</head>
<body>
  <h2>Interactive CFU/mL Calculator</h2>
  <table>
    <thead>
      <tr>
        <th>Strain</th>
        <th>Colonies per 10 μL</th>
        <th>Dilution Factor 1</th>
        <th>Dilution Factor 2<br>(10μL to 1mL)</th>
        <th>cfu/mL @ 0.2 OD</th>
        <th>cfu/mL @ 0.1 OD</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><input value="855"></td>
        <td><input type="number" value="6.33" class="colonies"></td>
        <td>
          <select class="dilution1">
            <option value="1e3">1e3</option>
            <option value="1e4">1e4</option>
            <option value="1e5">1e5</option>
            <option value="1e6" selected>1e6</option>
            <option value="1e7">1e7</option>
            <option value="1e8">1e8</option>
          </select>
        </td>
        <td><input type="number" value="100" class="dilution2"></td>
        <td class="cfu-02"></td>
        <td class="cfu-01"></td>
      </tr>
      <!-- Add more rows if needed -->
    </tbody>
  </table>

  <script>
    function calculateAll() {
      document.querySelectorAll("tbody tr").forEach(row => {
        const colonies = parseFloat(row.querySelector(".colonies").value);
        const dilution1 = parseFloat(row.querySelector(".dilution1").value);
        const dilution2 = parseFloat(row.querySelector(".dilution2").value);

        const cfu_02 = colonies * dilution1 * dilution2;
        const cfu_01 = cfu_02 / 2;

        row.querySelector(".cfu-02").textContent = cfu_02.toExponential(2);
        row.querySelector(".cfu-01").textContent = cfu_01.toExponential(2);
      });
    }

    // Attach event listeners
    document.querySelectorAll("input, select").forEach(el => {
      el.addEventListener("input", calculateAll);
      el.addEventListener("change", calculateAll);
    });

    // Initial calculation
    calculateAll();
  </script>
</body>
</html>
